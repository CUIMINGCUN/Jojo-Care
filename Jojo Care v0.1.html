<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🌙 Jojo Care</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

    <!-- =========================
         Header
    ========================== -->

    <header class="header">

        <h1 class="logo">
            🌙 Jojo Care
        </h1>

        <p class="subtitle">
            Made with ❤️ by Colin
        </p>

    </header>

    <!-- =========================
         Main
    ========================== -->

    <main>

        <!-- Today Card -->

        <section class="card">

            <h2>📅 Today's Status</h2>

            <div id="todayCard">

                <p class="placeholder">
                    Loading...
                </p>

            </div>

        </section>

        <!-- Advice -->

        <section class="card">

            <h2>❤️ Today's Advice</h2>

            <div id="adviceCard">

                <p class="placeholder">
                    Loading...
                </p>

            </div>

        </section>

        <!-- Food -->

        <section class="card">

            <h2>🍲 Today's Meal</h2>

            <div id="foodCard">

                <p class="placeholder">
                    Coming Soon
                </p>

            </div>

        </section>

        <!-- Message -->

        <section class="card">

            <h2>A Note For Jojo ❤️</h2>

            <div id="messageCard">

                <p class="placeholder">
                    Every cycle tells a story.
                </p>

            </div>

        </section>

    </main>

    <!-- =========================
         Bottom Navigation
    ========================== -->

    <nav class="bottom-nav">

        <button class="nav-item active">

            🏠

            <span>Home</span>

        </button>

        <button class="nav-item">

            📅

            <span>Cycle</span>

        </button>

        <button class="nav-item">

            ❤️

            <span>Notes</span>

        </button>

        <button class="nav-item">

            ⚖️

            <span>BMI</span>

        </button>

        <button class="nav-item">

            ⚙️

            <span>Settings</span>

        </button>

    </nav>

</div>

<script src="js/app.js"></script>

</body>

</html>
